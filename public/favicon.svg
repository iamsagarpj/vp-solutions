<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Pixel dots — top-left accent -->
  <rect x="3"  y="3"  width="5.5" height="5.5" rx="1.4" fill="#2563eb"/>
  <rect x="10.5" y="3"  width="5.5" height="5.5" rx="1.4" fill="#2563eb" opacity="0.55"/>
  <rect x="3"  y="10.5" width="5.5" height="5.5" rx="1.4" fill="#2563eb" opacity="0.28"/>

  <!-- V letterform (evenodd: outer triangle minus inner groove) -->
  <path fill-rule="evenodd" fill="#2563eb"
    d="M 3,16 L 35,16 L 20,47 Z
       M 11,16 L 27,16 L 20,41 Z"/>

  <!-- P letterform (evenodd: stem + bowl minus open inner) -->
  <path fill-rule="evenodd" fill="#1d4ed8"
    d="M 28,14 L 28,47 L 36,47 L 36,33
       Q 53,33 53,23.5
       Q 53,14 36,14
       Z
       M 36,20 Q 45,20 45,23.5 Q 45,27 36,27 Z"/>

  <!-- Bottom accent bar -->
  <rect x="3" y="51" width="50" height="2.5" rx="1.2" fill="#2563eb" opacity="0.35"/>

</svg>
